    <circle cx="157" cy="162" r="27" />
    <circle cx="448" cy="162" r="27" />
    <circle cx="97" cy="274" r="27" />
    <circle cx="205" cy="275" r="27" />
    <circle cx="506" cy="273" r="27" />
    <circle cx="54" cy="374" r="23" />
