<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 552 392" role="img" aria-labelledby="title desc">
  <title id="title">sbrep2 tree traversal logo</title>
  <desc id="desc">A tree graph logo with white branches and a blue highlighted traversal path.</desc>
  <defs>
    <style>
      .white-line,
      .white-node {
        fill: none;
        stroke: #ffffff;
        stroke-width: 14;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .blue-line,
      .blue-node {
        fill: none;
        stroke: #1da1f2;
        stroke-width: 14;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .blue-fill {
        fill: #1da1f2;
        stroke: #ffffff;
        stroke-width: 12;
      }
    </style>
  </defs>

  <g class="white-line">
